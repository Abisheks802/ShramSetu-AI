version: "3.1"

rules:

- rule: Start ESIC eligibility form
  steps:
  - intent: check_esic_eligibility
  - action: action_reset_esic_slots
  - action: esic_form
  - active_loop: esic_form

- rule: Submit ESIC eligibility form
  condition:
  - active_loop: esic_form
  steps:
  - action: esic_form
  - active_loop: null
  - action: utter_checking
  - action: action_check_esic_eligibility