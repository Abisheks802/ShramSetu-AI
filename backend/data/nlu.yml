version: "3.1"

nlu:

# =========================
# ESIC
# =========================

- intent: check_esic_eligibility
  examples: |
    - Am I eligible for ESIC?
    - Can you check my ESIC eligibility?
    - ESIC eligibility check
    - I want to check ESIC eligibility
    - check ESIC
    - ESIC status

- intent: provide_salary
  examples: |
    - my salary is [18000](salary)
    - [20000](salary)
    - salary [15000](salary)
    - I earn [21000](salary)
    - it is [17000](salary)
    - [12000](salary)

- intent: affirm
  examples: |
    - yes
    - Yes
    - yeah
    - correct
    - registered
    - it is registered

- intent: deny
  examples: |
    - no
    - No
    - not registered
    - nope
    - it is not registered


