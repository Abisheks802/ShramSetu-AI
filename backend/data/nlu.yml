    - calculate provident fund
    - PF check
    - how much PF will I get

- intent: provide_basic_salary
  examples: |
    - my basic salary is [15000](salary)
    - [10000](salary)
    - basic salary [22000](salary)
    - it is [18000](salary)
    - [8900](salary)
    - 8900
    - 15000
    - 22000


- intent: calculate_gratuity
  examples: |
    - I want to calculate gratuity
    - Calculate my gratuity
    - Check gratuity amount
    - Gratuity calculation