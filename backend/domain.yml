version: "3.1"

intents:
  - check_esic_eligibility
  - calculate_pf
  - calculate_gratuity
  - provide_salary
  - affirm
  - deny

entities:
  - salary
  - years

slots:
  salary:
    type: float
    mappings:
      - type: from_entity
        entity: salary
      - type: from_text
        conditions:
          - active_loop: esic_form
            requested_slot: salary

  employer_registered:
    type: bool
    mappings:
      - type: from_intent
        intent: affirm
        value: true
        conditions:
          - active_loop: esic_form
            requested_slot: employer_registered
      - type: from_intent
        intent: deny
        value: false
        conditions:
          - active_loop: esic_form
            requested_slot: employer_registered

  basic_salary:
    type: float
    mappings:
      - type: from_text
        conditions:
          - active_loop: pf_form
            requested_slot: basic_salary

  last_drawn_salary:
    type: float
    mappings:
      - type: from_text
        conditions:
          - active_loop: gratuity_form
            requested_slot: last_drawn_salary

  years_of_service:
    type: float
    mappings:
      - type: from_text
        conditions:
          - active_loop: gratuity_form
            requested_slot: years_of_service

responses:
  utter_ask_salary:
    - text: "What is your monthly salary?"

  utter_ask_employer_registered:
    - text: "Is your employer registered under ESIC? (Yes/No)"

  utter_checking:
    - text: "Checking your eligibility..."
  
  utter_ask_basic_salary:
     - text: "Please enter your basic salary to calculate PF."

  utter_ask_last_drawn_salary:
    - text: "Please enter your last drawn monthly salary."

  utter_ask_years_of_service:
    - text: "How many years have you worked in the company?"

forms:
  esic_form:
    required_slots:
      - salary
      - employer_registered
  
  pf_form:
    required_slots:
      - basic_salary

  gratuity_form:
    required_slots:
      - last_drawn_salary
      - years_of_service

actions:
  - action_reset_esic_slots
  - action_check_esic_eligibility
  - action_calculate_pf
  - action_reset_pf_slot
  - action_calculate_gratuity
  - action_reset_gratuity_slots

